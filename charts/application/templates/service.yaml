{{- if .Values.port -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "application.fullname" . }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "application.fullname" . }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
  selector:
    {{- include "application.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "application.fullname" . }}
{{- end }}
